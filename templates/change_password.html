{% extends "base.html" %}
{% block content %}
<div class="auth-container">
  <h1 class="auth-title">החלפת סיסמה</h1>
  <form method="POST">
    <div class="form-group">
      <label for="current_password">סיסמה נוכחית</label>
      <input type="password" id="current_password" name="current_password" required placeholder="הכנס סיסמה נוכחית" dir="ltr" autofocus>
    </div>
    <div class="form-group">
      <label for="password">סיסמה חדשה</label>
      <input type="password" id="password" name="password" required placeholder="בחר סיסמה חדשה" dir="ltr">
    </div>
    <div class="form-group">
      <label for="password2">אשר סיסמה חדשה</label>
      <input type="password" id="password2" name="password2" required placeholder="הכנס סיסמה שוב" dir="ltr">
    </div>
    <button type="submit" class="btn btn-full">שמור סיסמה חדשה</button>
  </form>
  <div class="auth-link">
    <a href="{{ url_for('settings') }}">חזרה להגדרות</a>
  </div>
</div>
{% endblock %}
