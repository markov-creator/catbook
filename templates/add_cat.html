{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <h1 class="page-title">הוסף חתול חדש</h1>
  <a href="{{ url_for('cats') }}" class="btn btn-secondary">חזור</a>
</div>

<div class="form-card">
  <form method="POST" id="add-cat-form" enctype="multipart/form-data">

    <div class="form-group">
      <label for="cat-name">שם החתול</label>
      <input type="text" id="cat-name" name="name" required placeholder="למשל: מיאו, פלאפי, ברנדה..." autofocus>
    </div>

    <div class="form-group">
      <label>תמונות של החתול</label>
      <div id="photo-preview" style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:0.5rem"></div>
      <div id="photo-urls-container"></div>
      <div id="feature-tokens-container"></div>
      <label class="btn btn-secondary" style="cursor:pointer;display:inline-block">
        📷 הוסף תמונה
        <input type="file" id="photo-file-input" accept="image/*" style="display:none">
      </label>
      <span id="upload-status" style="margin-right:0.5rem;font-size:0.85rem;color:#666"></span>
      <span class="hint" style="display:block;margin-top:0.4rem">ניתן להוסיף מספר תמונות — ככל שיותר תמונות, כך הזיהוי יהיה מדויק יותר</span>
    </div>

    <button type="submit" class="btn btn-full">שמור חתול</button>
  </form>
</div>

<script>
const CLOUD_NAME = '{{ CLOUDINARY_CLOUD_NAME }}';
const UPLOAD_PRESET = '{{ CLOUDINARY_UPLOAD_PRESET }}';
const USER_ID = '{{ session.user_id }}';
let pendingCount = 0;

document.getElementById('photo-file-input').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  this.value = '';
  showCropModal(file, function(croppedBlob) { uploadCroppedPhoto(croppedBlob, file); });
});

async function uploadCroppedPhoto(imageBlob, originalFile) {
  const imgEl = document.createElement('img');
  imgEl.src = URL.createObjectURL(imageBlob);
  imgEl.style.cssText = 'width:80px;height:80px;object-fit:cover;border-radius:8px;opacity:0.5';
  const wrapper = document.createElement('div');
  wrapper.appendChild(imgEl);
  document.getElementById('photo-preview').appendChild(wrapper);

  pendingCount++;
  document.getElementById('upload-status').textContent = '⏳ מעלה תמונה...';

  try {
    const featForm = new FormData();
    featForm.append('photo', imageBlob, 'photo.jpg');

    const cloudForm = new FormData();
    cloudForm.append('file', originalFile || imageBlob, 'photo.jpg');  // original → for display
    cloudForm.append('upload_preset', UPLOAD_PRESET);
    cloudForm.append('folder', 'catbook/' + USER_ID);

    const [featRes, cloudRes] = await Promise.all([
      fetch('/api/extract-features', {method: 'POST', body: featForm}),
      fetch('https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/image/upload', {method: 'POST', body: cloudForm})
    ]);

    const featData = await featRes.json();
    const cloudData = await cloudRes.json();

    const urlInput = document.createElement('input');
    urlInput.type = 'hidden'; urlInput.name = 'photo_urls'; urlInput.value = cloudData.secure_url;
    document.getElementById('photo-urls-container').appendChild(urlInput);

    const tokenInput = document.createElement('input');
    tokenInput.type = 'hidden'; tokenInput.name = 'feature_tokens'; tokenInput.value = featData.token || '';
    document.getElementById('feature-tokens-container').appendChild(tokenInput);

    imgEl.src = cloudData.secure_url;
    imgEl.style.opacity = '1';
  } catch(e) {
    wrapper.remove();
    alert('שגיאה בהעלאת תמונה');
  } finally {
    pendingCount--;
    document.getElementById('upload-status').textContent = pendingCount > 0 ? '⏳ מעלה תמונה...' : '';
  }
}

document.getElementById('add-cat-form').addEventListener('submit', function(e) {
  if (pendingCount > 0) {
    e.preventDefault();
    alert('אנא המתן לסיום העלאת התמונות');
  }
});
</script>

{% endblock %}
