{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <h1 class="page-title">הוסף חתול חדש</h1>
  <a href="{{ url_for('cats') }}" class="btn btn-secondary">חזור</a>
</div>

<div class="form-card">
  <form method="POST" enctype="multipart/form-data">

    <div class="form-group">
      <label for="cat-name">שם החתול</label>
      <input type="text" id="cat-name" name="name" required placeholder="למשל: מיאו, פלאפי, ברנדה..." autofocus>
    </div>

    <div class="form-group">
      <label>תמונות של החתול</label>
      <div class="file-input-wrapper" onclick="document.getElementById('cat-photos').click()">
        <input type="file" id="cat-photos" name="photos" accept="image/*" multiple>
        <div class="file-input-label">
          <span id="photo-label">לחץ לבחירת תמונות</span>
        </div>
      </div>
      <span class="hint">ניתן לבחור מספר תמונות — ככל שיותר תמונות, כך הזיהוי יהיה מדויק יותר</span>
      <div id="photo-preview"></div>
    </div>

    <button type="submit" class="btn btn-full">שמור חתול</button>
  </form>
</div>

{% endblock %}
