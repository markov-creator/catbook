{% extends "base.html" %}
{% block content %}
<div class="auth-container">
  <h1 class="auth-title">איפוס סיסמה</h1>
  <form method="POST">
    <div class="form-group">
      <label for="password">סיסמה חדשה</label>
      <input type="password" id="password" name="password" required placeholder="בחר סיסמה חדשה" dir="ltr" autofocus>
    </div>
    <div class="form-group">
      <label for="password2">אשר סיסמה</label>
      <input type="password" id="password2" name="password2" required placeholder="הכנס סיסמה שוב" dir="ltr">
    </div>
    <button type="submit" class="btn btn-full">שמור סיסמה חדשה</button>
  </form>
</div>
{% endblock %}
