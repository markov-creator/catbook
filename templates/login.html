{% extends "base.html" %}
{% block content %}
<div class="auth-container">
  <h1 class="auth-title">🐱 CatBook</h1>
  <p style="text-align:center;color:var(--purple);margin:-0.5rem 0 1rem;font-size:1.3rem;font-weight:700;letter-spacing:0.02em;">קהילת &#10084;&#65039; חתולים</p>
  <form method="POST" autocomplete="off">
    <div class="form-group">
      <label for="username">שם משתמש</label>
      <input type="text" id="username" name="username" required placeholder="הכנס שם משתמש" autofocus dir="auto">
    </div>
    <div class="form-group">
      <label for="password">סיסמה</label>
      <input type="password" id="password" name="password" required placeholder="הכנס סיסמה" dir="ltr">
    </div>
    <button type="submit" class="btn btn-full">התחבר</button>
  </form>
  <div class="auth-link">
    אין לך חשבון? <strong>הרשמה ושימוש חינם</strong> — <a href="{{ url_for('register') }}">כאן</a>
  </div>
  <div class="auth-link" style="margin-top:0.5rem">
    <a href="{{ url_for('forgot_password') }}">שכחת סיסמה?</a>
  </div>
</div>
{% endblock %}
