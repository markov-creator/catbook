{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <h1 class="page-title">פוסט חדש</h1>
  <a href="{{ url_for('posts') }}" class="btn btn-secondary">← חזרה לפוסטים</a>
</div>

<div class="post-create-card">
  <form method="POST" action="{{ url_for('post_create') }}" enctype="multipart/form-data">
    <div class="post-create-row">
      <select name="cat_id">
        <option value="">ללא חתול ספציפי</option>
        {% for cat in my_cats %}
          <option value="{{ cat.id }}">{{ cat.name }}</option>
        {% endfor %}
      </select>
      <select name="purpose">
        <option value="share">פרסום החתול שלי</option>
        <option value="adoption">חתול לאימוץ</option>
      </select>
      <select name="visibility">
        <option value="friends">חברים בלבד</option>
        <option value="everyone">כולם</option>
      </select>
    </div>
    <input type="hidden" name="photo_url" id="post-photo-url" value="">
    <div id="post-photo-preview" style="display:none;margin:0.5rem 0">
      <img id="post-photo-thumb" src="" style="max-width:100%;max-height:300px;border-radius:8px">
      <button type="button" onclick="clearPostPhoto()" style="display:block;margin-top:0.25rem;background:none;border:none;cursor:pointer;color:#888">✕ הסר תמונה</button>
    </div>
    <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;margin:0.5rem 0">
      <button type="button" class="btn btn-secondary" onclick="openPostWidget()" style="flex:1;min-width:140px">📷 העלה תמונה</button>
      {% if my_cat_photos %}
      <button type="button" class="btn btn-secondary" onclick="toggleCatPicker()"
              style="flex:1;min-width:140px">🐱 בחר מהחתולים שלי</button>
      {% endif %}
    </div>
    {% if my_cat_photos %}
    <div id="cat-picker" style="display:none;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.5rem;max-height:200px;overflow-y:auto;padding:4px">
      {% for p in my_cat_photos %}
      <div onclick="selectCatPhoto('{{ photo_url(p.filename) }}')"
           style="cursor:pointer;text-align:center;width:72px">
        <img src="{{ photo_url(p.filename) }}"
             style="width:64px;height:64px;object-fit:cover;border-radius:8px;border:2px solid transparent"
             class="cat-picker-thumb">
        <div style="font-size:.72rem;color:#666;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:72px">{{ p.cat_name }}</div>
      </div>
      {% endfor %}
    </div>
    {% endif %}
    <textarea name="caption" placeholder="כיתוב (אופציונלי)..." rows="3"
              style="width:100%;resize:vertical;border:1.5px solid var(--purple-light);border-radius:8px;padding:0.5rem;font-family:inherit;font-size:1rem;"></textarea>
    <button type="submit" class="btn" style="width:100%;margin-top:0.5rem">פרסם</button>
  </form>
</div>

<script src="https://upload-widget.cloudinary.com/global/all.js"></script>
<script>
const CLOUD_NAME = '{{ CLOUDINARY_CLOUD_NAME }}';
const UPLOAD_PRESET = '{{ CLOUDINARY_UPLOAD_PRESET }}';

function openPostWidget() {
  cloudinary.openUploadWidget({
    cloudName: CLOUD_NAME,
    uploadPreset: UPLOAD_PRESET,
    sources: ['local', 'camera'],
    multiple: false,
    language: 'he'
  }, function(error, result) {
    if (!error && result && result.event === 'success') {
      const url = result.info.secure_url;
      document.getElementById('post-photo-url').value = url;
      document.getElementById('post-photo-thumb').src = url;
      document.getElementById('post-photo-preview').style.display = 'block';
    }
  });
}

function clearPostPhoto() {
  document.getElementById('post-photo-url').value = '';
  document.getElementById('post-photo-preview').style.display = 'none';
  document.getElementById('post-photo-thumb').src = '';
  document.querySelectorAll('.cat-picker-thumb').forEach(t => t.style.border = '2px solid transparent');
}

function toggleCatPicker() {
  const picker = document.getElementById('cat-picker');
  picker.style.display = picker.style.display === 'flex' ? 'none' : 'flex';
}

function selectCatPhoto(url) {
  document.getElementById('post-photo-url').value = url;
  document.getElementById('post-photo-thumb').src = url;
  document.getElementById('post-photo-preview').style.display = 'block';
  document.querySelectorAll('.cat-picker-thumb').forEach(t => {
    t.style.border = t.parentElement.onclick.toString().includes(url.replace(/'/g,"\'"))
      ? '2px solid #6a0dad' : '2px solid transparent';
  });
  document.getElementById('cat-picker').style.display = 'none';
}
</script>

{% endblock %}
