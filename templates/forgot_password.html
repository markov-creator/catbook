{% extends "base.html" %}
{% block content %}
<div class="auth-container">
  <h1 class="auth-title">שחזור סיסמה</h1>
  <p style="text-align:center;color:var(--gray);font-size:0.95rem;margin-bottom:1.5rem">
    הכנס את האימייל שלך ונשלח לך קישור לאיפוס הסיסמה
  </p>
  <form method="POST">
    <div class="form-group">
      <label for="email">אימייל</label>
      <input type="email" id="email" name="email" required placeholder="example@email.com" dir="ltr" autofocus>
    </div>
    <button type="submit" class="btn btn-full">שלח קישור לאיפוס</button>
  </form>
  <div class="auth-link">
    <a href="{{ url_for('login') }}">חזרה להתחברות</a>
  </div>
  <div class="auth-link" style="margin-top:0.75rem;font-size:0.88rem;color:var(--gray)">
    אין לך אימייל רשום? פנה למנהל המערכת לאיפוס ידני
  </div>
</div>
{% endblock %}
